<!DOCTYPE html>
<html>
<head>
    <title>测试刷新按钮</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 15px; margin: 5px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>测试刷新按钮功能</h1>

    <div>
        <button onclick="testLogin()">登录 (student001)</button>
        <button onclick="testStudentExitAPI()">测试学生出校API</button>
        <button onclick="testRefreshFunction()">测试刷新功能</button>
    </div>

    <div id="results"></div>

    <script>
        let authToken = null;

        function addResult(message, isError = false) {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${isError ? 'error' : 'success'}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            resultsDiv.appendChild(div);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        async function testLogin() {
            try {
                addResult('正在登录...');

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'student001',
                        password: 'test123456'
                    })
                });

                const data = await response.json();

                if (response.ok && data.access_token) {
                    authToken = data.access_token;
                    addResult(`登录成功! Token: ${authToken.substring(0, 20)}...`);
                } else {
                    addResult(`登录失败: ${data.error || '未知错误'}`, true);
                }
            } catch (error) {
                addResult(`登录错误: ${error.message}`, true);
            }
        }

        async function testStudentExitAPI() {
            if (!authToken) {
                addResult('请先登录!', true);
                return;
            }

            try {
                addResult('测试学生出校API...');

                const response = await fetch('/api/student-exit/applications/recent', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    addResult(`API调用成功! 返回${data.applications ? data.applications.length : 0}个申请`);

                    if (data.applications && data.applications.length > 0) {
                        data.applications.forEach((app, index) => {
                            addResult(`申请${index + 1}: ${app.applicant_name} - ${app.reason} - 状态: ${app.application_status}`);
                        });
                    }
                } else {
                    addResult(`API调用失败: ${data.error || '未知错误'}`, true);
                }
            } catch (error) {
                addResult(`API调用错误: ${error.message}`, true);
            }
        }

        async function testRefreshFunction() {
            if (!authToken) {
                addResult('请先登录!', true);
                return;
            }

            try {
                addResult('模拟刷新功能...');

                // 模拟 HomePage.loadRecentApplications 的核心逻辑
                const container = document.createElement('div');
                let allApplications = [];

                // 1. 测试访问申请
                try {
                    const visitResponse = await fetch('/api/visits/applications?per_page=3', {
                        headers: {
                            'Authorization': `Bearer ${authToken}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (visitResponse.ok) {
                        const visitData = await visitResponse.json();
                        if (visitData.applications && visitData.applications.length > 0) {
                            const visitApplications = visitData.applications.map(app => ({
                                ...app,
                                application_type: 'visit',
                                application_status: app.application_status || app.status
                            }));
                            allApplications = allApplications.concat(visitApplications);
                            addResult(`获取到${visitApplications.length}个访问申请`);
                        }
                    }
                } catch (error) {
                    addResult(`访问申请加载失败: ${error.message}`);
                }

                // 2. 测试学生出校申请
                try {
                    const studentExitResponse = await fetch('/api/student-exit/applications/recent', {
                        headers: {
                            'Authorization': `Bearer ${authToken}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (studentExitResponse.ok) {
                        const studentExitData = await studentExitResponse.json();
                        if (studentExitData.success && studentExitData.applications && studentExitData.applications.length > 0) {
                            const studentExitApplications = studentExitData.applications.map(app => ({
                                ...app,
                                application_type: 'student_exit',
                                application_status: app.status,
                                applicant_name: app.student_name || app.applicant_name,
                                visit_date: app.exit_date,
                                visit_time: app.exit_time,
                                purpose: app.reason
                            }));
                            allApplications = allApplications.concat(studentExitApplications);
                            addResult(`获取到${studentExitApplications.length}个学生出校申请`);
                        }
                    }
                } catch (error) {
                    addResult(`学生出校申请加载失败: ${error.message}`, true);
                }

                // 3. 处理结果
                if (allApplications.length === 0) {
                    addResult('没有找到任何申请记录');
                } else {
                    addResult(`总共找到${allApplications.length}个申请:`);
                    allApplications.forEach((app, index) => {
                        const typeText = app.application_type === 'student_exit' ? '学生出校' : '访问申请';
                        addResult(`${index + 1}. [${typeText}] ${app.applicant_name || '未知'} - ${app.purpose || app.visit_purpose || '无目的'} - 状态: ${app.application_status}`);
                    });
                }

            } catch (error) {
                addResult(`刷新功能错误: ${error.message}`, true);
            }
        }

        // 页面加载时自动登录
        window.onload = function() {
            addResult('页面加载完成，可以开始测试');
        };
    </script>
</body>
</html>
