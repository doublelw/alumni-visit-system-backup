<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门卫验证系统</title>
    <style>
        /* 基础样式，替代Tailwind CSS */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #374151;
        }
        .bg-gray-50 { background-color: #f9fafb; }
        .bg-white { background-color: #ffffff; }
        .bg-blue-50 { background-color: #eff6ff; }
        .bg-green-100 { background-color: #dcfce7; }
        .bg-blue-100 { background-color: #dbeafe; }
        .bg-gray-50 { background-color: #f9fafb; }

        .text-blue-600 { color: #2563eb; }
        .text-blue-700 { color: #1d4ed8; }
        .text-blue-800 { color: #1e40af; }
        .text-green-600 { color: #16a34a; }
        .text-green-800 { color: #15803d; }
        .text-red-600 { color: #dc2626; }
        .text-red-800 { color: #991b1b; }
        .text-yellow-600 { color: #d97706; }
        .text-yellow-800 { color: #92400e; }
        .text-gray-400 { color: #9ca3af; }
        .text-gray-500 { color: #6b7280; }
        .text-gray-600 { color: #4b5563; }
        .text-gray-700 { color: #374151; }
        .text-gray-800 { color: #1f2937; }
        .text-white { color: #ffffff; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .py-6 { padding-top: 1.5rem; padding-bottom: 1.5rem; }
        .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }

        .p-8 { padding: 2rem; }
        .p-6 { padding: 1.5rem; }
        .p-4 { padding: 1rem; }
        .p-3 { padding: 0.75rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }

        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .rounded-lg { border-radius: 0.5rem; }
        .rounded { border-radius: 0.25rem; }
        .rounded-full { border-radius: 9999px; }

        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }

        .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
        .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
        .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
        .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
        .text-xs { font-size: 0.75rem; line-height: 1rem; }

        .font-bold { font-weight: 700; }
        .font-semibold { font-weight: 600; }
        .font-medium { font-weight: 500; }

        .text-center { text-align: center; }
        .block { display: block; }
        .inline-block { display: inline-block; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .grid { display: grid; }
        .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
        .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .space-y-3 > * + * { margin-top: 0.75rem; }

        .w-full { width: 100%; }
        .max-w-md { max-width: 28rem; }

        .hover\:border-blue-400:hover { border-color: #60a5fa; }
        .transition-colors { transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out, border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out; }

        .hidden { display: none; }
        .border { border: 1px solid #d1d5db; }
        .border-dashed { border-style: dashed; }
        .border-gray-300 { border-color: #d1d5db; }
        .border-blue-400 { border-color: #60a5fa; }

        /* 图标替代 - 使用emoji */
        .bi-shield-check::before { content: "🛡️"; }
        .bi-qr-code-scan::before { content: "📱"; }
        .bi-search::before { content: "🔍"; }
        .bi-info-circle::before { content: "ℹ️"; }
        .bi-check-circle-fill::before { content: "✅"; }
        .bi-x-circle-fill::before { content: "❌"; }
        .bi-exclamation-triangle-fill::before { content: "⚠️"; }
        .bi-arrow-clockwise::before { content: "🔄"; }

        .bi { margin-right: 0.5rem; }
    </style>
    <style>
        .scanner-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .result-card {
            transition: all 0.3s ease;
        }
        .success-card {
            border-left: 4px solid #10b981;
            background-color: #f0fdf4;
        }
        .error-card {
            border-left: 4px solid #ef4444;
            background-color: #fef2f2;
        }
        .warning-card {
            border-left: 4px solid #f59e0b;
            background-color: #fffbeb;
        }
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .scanner-active {
            border: 2px dashed #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen py-8">
        <div class="container mx-auto px-4">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">
                    <i class="bi bi-shield-check text-blue-600"></i> 门卫验证系统
                </h1>
                <p class="text-gray-600">扫描访客二维码验证访问信息</p>
            </div>

            <!-- Scanner Section -->
            <div class="scanner-container bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="text-center mb-6">
                    <div id="scannerArea" class="border-2 border-dashed border-gray-300 rounded-lg p-8 hover:border-blue-400 transition-colors">
                        <i class="bi bi-qr-code-scan text-6xl text-gray-400 mb-4"></i>
                        <h3 class="text-xl font-semibold text-gray-700 mb-2">输入访问申请编号</h3>
                        <p class="text-gray-500 mb-4">请输入访客提供的访问申请编号进行验证</p>

                        <div class="max-w-md mx-auto">
                            <input
                                type="number"
                                id="applicationIdInput"
                                class="w-full px-4 py-3 text-lg border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="请输入访问申请编号"
                                min="1"
                            >
                            <button
                                onclick="verifyApplication()"
                                class="mt-4 w-full bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors font-semibold"
                            >
                                <i class="bi bi-search"></i> 验证访问信息
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="hidden text-center py-8">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    <p class="mt-4 text-gray-600">正在验证访问信息...</p>
                </div>

                <!-- Result Section -->
                <div id="resultSection" class="hidden">
                    <!-- Results will be displayed here -->
                </div>
            </div>

            <!-- Instructions -->
            <div class="scanner-container bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="bi bi-info-circle"></i> 使用说明
                </h3>
                <div class="space-y-3 text-sm text-gray-600">
                    <div class="flex items-start">
                        <span class="text-blue-600 mr-2">1.</span>
                        <p>访客在手机上展示已批准的访问申请二维码</p>
                    </div>
                    <div class="flex items-start">
                        <span class="text-blue-600 mr-2">2.</span>
                        <p>在输入框中输入访问申请编号（二维码中包含的ID）</p>
                    </div>
                    <div class="flex items-start">
                        <span class="text-blue-600 mr-2">3.</span>
                        <p>点击"验证访问信息"按钮查看访客详细信息</p>
                    </div>
                    <div class="flex items-start">
                        <span class="text-blue-600 mr-2">4.</span>
                        <p>核对访客信息无误后允许访客进入校园</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        async function verifyApplication() {
            const applicationId = document.getElementById('applicationIdInput').value.trim();

            if (!applicationId) {
                showResult('error', '请输入访问申请编号');
                return;
            }

            if (isNaN(applicationId) || parseInt(applicationId) < 1) {
                showResult('error', '请输入有效的访问申请编号');
                return;
            }

            // Show loading state
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('resultSection').classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/qr-codes/verify/${applicationId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                document.getElementById('loadingState').classList.add('hidden');

                if (response.ok && data.valid) {
                    showResult('success', '访问申请有效', data);
                } else {
                    showResult('error', data.error || '验证失败');
                }
            } catch (error) {
                document.getElementById('loadingState').classList.add('hidden');
                showResult('error', '网络错误，请稍后重试');
            }
        }

        function showResult(type, message, data = null) {
            const resultSection = document.getElementById('resultSection');
            resultSection.classList.remove('hidden');

            let cardClass = '';
            let iconClass = '';
            let titleClass = '';

            switch (type) {
                case 'success':
                    cardClass = 'success-card';
                    iconClass = 'bi-check-circle-fill text-green-600';
                    titleClass = 'text-green-800';
                    break;
                case 'error':
                    cardClass = 'error-card';
                    iconClass = 'bi-x-circle-fill text-red-600';
                    titleClass = 'text-red-800';
                    break;
                case 'warning':
                    cardClass = 'warning-card';
                    iconClass = 'bi-exclamation-triangle-fill text-yellow-600';
                    titleClass = 'text-yellow-800';
                    break;
            }

            if (type === 'success' && data) {
                resultSection.innerHTML = `
                    <div class="result-card ${cardClass} rounded-lg p-6">
                        <div class="flex items-center mb-4">
                            <i class="bi ${iconClass} text-2xl mr-3"></i>
                            <h3 class="text-xl font-semibold ${titleClass}">${message}</h3>
                        </div>

                        <div class="bg-white rounded-lg p-4">
                            <h4 class="font-semibold text-gray-800 mb-3">访客信息</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <span class="text-gray-600">访客姓名：</span>
                                    <span class="font-medium">${data.application.visitor_name || '未填写'}</span>
                                </div>
                                <div>
                                    <span class="text-gray-600">联系电话：</span>
                                    <span class="font-medium">${data.application.visitor_phone || '未填写'}</span>
                                </div>
                                <div>
                                    <span class="text-gray-600">访问日期：</span>
                                    <span class="font-medium">${data.application.visit_date}</span>
                                </div>
                                <div>
                                    <span class="text-gray-600">访问时间：</span>
                                    <span class="font-medium">${data.application.visit_time_start} - ${data.application.visit_time_end}</span>
                                </div>
                                <div>
                                    <span class="text-gray-600">访问目的：</span>
                                    <span class="font-medium">${data.application.visit_purpose}</span>
                                </div>
                                <div>
                                    <span class="text-gray-600">被访人：</span>
                                    <span class="font-medium">${data.application.target_person}</span>
                                </div>
                                <div>
                                    <span class="text-gray-600">被访部门：</span>
                                    <span class="font-medium">${data.application.target_department || '未填写'}</span>
                                </div>
                                <div>
                                    <span class="text-gray-600">申请状态：</span>
                                    <span class="inline-block px-2 py-1 text-xs font-semibold text-green-800 bg-green-100 rounded-full">
                                        已通过
                                    </span>
                                </div>
                            </div>

                            ${data.application.approval_note ? `
                            <div class="mt-4 p-3 bg-blue-50 rounded-lg">
                                <p class="text-sm text-blue-800">
                                    <strong>审批备注：</strong>${data.application.approval_note}
                                </p>
                            </div>
                            ` : ''}

                            ${data.application.applicant ? `
                            <div class="mt-4 p-3 bg-gray-50 rounded-lg">
                                <p class="text-sm text-gray-700">
                                    <strong>申请人：</strong>${data.application.applicant.name} (${data.application.applicant.email})
                                </p>
                            </div>
                            ` : ''}

                            <div class="mt-4 text-xs text-gray-500">
                                申请时间：${data.application.created_at}
                            </div>
                        </div>

                        <div class="mt-4 text-center">
                            <button onclick="resetScanner()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                                <i class="bi bi-arrow-clockwise"></i> 验证下一个
                            </button>
                        </div>
                    </div>
                `;
            } else {
                resultSection.innerHTML = `
                    <div class="result-card ${cardClass} rounded-lg p-6">
                        <div class="flex items-center">
                            <i class="bi ${iconClass} text-2xl mr-3"></i>
                            <h3 class="text-xl font-semibold ${titleClass}">${message}</h3>
                        </div>
                        <div class="mt-4 text-center">
                            <button onclick="resetScanner()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                                <i class="bi bi-arrow-clockwise"></i> 重新验证
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        function resetScanner() {
            document.getElementById('applicationIdInput').value = '';
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('applicationIdInput').focus();
        }

        // Allow Enter key to trigger verification
        document.getElementById('applicationIdInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyApplication();
            }
        });

        // Focus input on page load
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('applicationIdInput').focus();
        });
    </script>
</body>
</html>
