<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>访客验证 - 辽宁省实验中学</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-card {
            margin-top: 24px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .result-card.success {
            background: #f0fff4;
            border: 1px solid #52c41a;
        }

        .result-card.error {
            background: #fff5f5;
            border: 1px solid #f5222d;
        }

        .access-code {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            text-align: center;
            letter-spacing: 8px;
            margin: 16px 0;
        }

        .result-label {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 8px;
        }

        .error-message {
            color: #f5222d;
            text-align: center;
            font-size: 14px;
        }

        .success-message {
            color: #52c41a;
            text-align: center;
            font-size: 14px;
        }

        .visitor-info {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }

        .visitor-info p {
            font-size: 14px;
            color: #666;
            margin: 4px 0;
        }

        .visitor-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 访客验证</h1>
            <p>输入手机号和访问密码获取访问码</p>
        </div>

        <form id="verifyForm">
            <div class="form-group">
                <label for="phone">手机号码</label>
                <input type="tel" id="phone" maxlength="11" placeholder="请输入11位手机号" required>
            </div>

            <div class="form-group">
                <label for="password">访问密码</label>
                <input type="tel" id="password" maxlength="2" placeholder="请输入2位数字密码" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">获取访问码</button>
        </form>

        <div class="result-card" id="resultCard">
            <div class="result-label">您的访问码</div>
            <div class="access-code" id="accessCode"></div>
            <div id="resultMessage"></div>
            <div class="visitor-info" id="visitorInfo"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000';
        const HMAC_SECRET_KEY = '辽宁省实验中学访客验证系统HMAC密钥2024';

        document.getElementById('verifyForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const resultCard = document.getElementById('resultCard');

            // 验证输入
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                showResult('error', '请输入正确的11位手机号');
                return;
            }

            if (!password || !/^\d{2}$/.test(password)) {
                showResult('error', '请输入2位数字密码');
                return;
            }

            // 显示加载状态
            submitBtn.disabled = true;
            submitBtn.textContent = '验证中...';
            resultCard.classList.remove('show');

            try {
                // 生成HMAC访问码
                const timestamp = Math.floor(Date.now() / 1000);
                const message = `${phone}${password}${timestamp}`;
                const accessCode = await generateHMACCode(message);

                // 调用后端验证API
                const response = await fetch(`${API_BASE_URL}/api/wechat/visitor/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone: phone,
                        password: password,
                        access_code: accessCode
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showResult('success', accessCode, result.data);
                } else {
                    showResult('error', result.error || '验证失败');
                }

            } catch (error) {
                console.error('验证失败:', error);
                showResult('error', '网络错误，请重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '获取访问码';
            }
        });

        /**
         * 生成HMAC-SHA256哈希
         */
        async function hmacSHA256(message) {
            const encoder = new TextEncoder();
            const data = encoder.encode(message);
            const keyData = encoder.encode(HMAC_SECRET_KEY);

            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                keyData,
                { name: 'HMAC', hash: 'SHA-256' },
                false,
                ['sign']
            );

            const signature = await crypto.subtle.sign(
                'HMAC',
                cryptoKey,
                data
            );

            const hashArray = Array.from(new Uint8Array(signature));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        /**
         * 生成HMAC动态码（6位数字）
         */
        async function generateHMACCode(message) {
            const hmacHex = await hmacSHA256(message);

            // 提取所有数字
            let digits = '';
            for (let char of hmacHex) {
                if (char >= '0' && char <= '9') {
                    digits += char;
                }
            }

            // 如果不足6位，循环使用
            while (digits.length < 6) {
                digits += digits;
            }

            // 取前6位
            return digits.substring(0, 6);
        }

        function showResult(type, accessCode, visitorData) {
            const resultCard = document.getElementById('resultCard');
            const accessCodeDiv = document.getElementById('accessCode');
            const resultMessage = document.getElementById('resultMessage');
            const visitorInfo = document.getElementById('visitorInfo');

            resultCard.classList.remove('success', 'error');
            resultCard.classList.add('show');

            if (type === 'success') {
                resultCard.classList.add('success');
                accessCodeDiv.textContent = accessCode;

                if (visitorData) {
                    resultMessage.innerHTML = '<div class="success-message">✅ 验证成功</div>';
                    visitorInfo.innerHTML = `
                        <p><strong>姓名：</strong>${visitorData.name || '-'}</p>
                        <p><strong>来访目的：</strong>${visitorData.visit_purpose || '-'}</p>
                        <p><strong>状态：</strong>${visitorData.status || '有效'}</p>
                    `;
                } else {
                    resultMessage.innerHTML = '<div class="success-message">✅ 访问码生成成功</div>';
                    visitorInfo.innerHTML = '';
                }
            } else {
                resultCard.classList.add('error');
                accessCodeDiv.textContent = '----';
                resultMessage.innerHTML = `<div class="error-message">${accessCode}</div>`;
                visitorInfo.innerHTML = '';
            }
        }
    </script>
</body>
</html>
