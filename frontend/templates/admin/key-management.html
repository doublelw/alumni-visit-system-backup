<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密钥管理 - 校园管理系统</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <style>
        .key-management-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .page-header p {
            color: #666;
            font-size: 14px;
        }

        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
        }

        .status-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .status-card-header h3 {
            font-size: 18px;
            color: #333;
            margin: 0;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-badge.ok {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.danger {
            background: #f8d7da;
            color: #721c24;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #666;
            font-size: 14px;
        }

        .status-value {
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-rotate {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            margin-top: 15px;
        }

        .btn-rotate:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-rotate:active {
            transform: translateY(0);
        }

        .btn-rotate:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .history-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-header h2 {
            font-size: 20px;
            color: #333;
            margin: 0;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        .history-table th {
            background: #f8f9fa;
            color: #666;
            font-weight: bold;
            font-size: 13px;
        }

        .history-table td {
            color: #333;
            font-size: 14px;
        }

        .history-table tr:hover {
            background: #f8f9fa;
        }

        .wechat-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
            margin-top: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #667eea;
            outline: none;
        }

        .btn-update {
            padding: 12px 30px;
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(132, 250, 176, 0.4);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state p {
            margin: 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="key-management-container">
        <div class="page-header">
            <h1>🔐 密钥管理</h1>
            <p>管理系统安全密钥，定期更换以保障系统安全</p>
        </div>

        <div id="alert" class="alert"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>

        <!-- 密钥状态卡片 -->
        <div class="status-cards" id="statusCards">
            <!-- 电子卡密钥 -->
            <div class="status-card">
                <div class="status-card-header">
                    <h3>💳 电子校友卡HMAC密钥</h3>
                    <span class="status-badge" id="electronicCardBadge">检查中...</span>
                </div>
                <div class="status-item">
                    <span class="status-label">最后更换时间</span>
                    <span class="status-value" id="electronicCardLastChanged">--</span>
                </div>
                <div class="status-item">
                    <span class="status-label">已使用天数</span>
                    <span class="status-value" id="electronicCardDays">-- 天</span>
                </div>
                <div class="status-item">
                    <span class="status-label">建议更换周期</span>
                    <span class="status-value">每30天</span>
                </div>
                <div class="status-item">
                    <span class="status-label">更换状态</span>
                    <span class="status-value" id="electronicCardStatus">--</span>
                </div>
                <button class="btn-rotate" onclick="rotateKey('electronic_card')">
                    🔄 立即更换密钥
                </button>
            </div>

            <!-- 微信密码 -->
            <div class="status-card">
                <div class="status-card-header">
                    <h3>📱 微信登录密码</h3>
                    <span class="status-badge ok">✓ 正常</span>
                </div>
                <div class="status-item">
                    <span class="status-label">教师密码（2-4位）</span>
                    <span class="status-value" id="teacherPassword">****</span>
                </div>
                <div class="status-item">
                    <span class="status-label">家长密码（2-4位）</span>
                    <span class="status-value" id="parentPassword">****</span>
                </div>
                <div class="status-item">
                    <span class="status-label">最后更新时间</span>
                    <span class="status-value" id="wechatLastUpdated">--</span>
                </div>
            </div>
        </div>

        <!-- 微信密码更新 -->
        <div class="wechat-section">
            <div class="status-card-header">
                <h3>📝 更新微信登录密码</h3>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="teacherPasswordInput">教师密码（2-4位）</label>
                    <input type="text" id="teacherPasswordInput" placeholder="1234" maxlength="4">
                </div>
                <div class="form-group">
                    <label for="parentPasswordInput">家长密码（2-4位）</label>
                    <input type="text" id="parentPasswordInput" placeholder="88" maxlength="4">
                </div>
            </div>
            <button class="btn-update" onclick="updateWechatPasswords()">
                💾 更新密码
            </button>
        </div>

        <!-- 密钥更换历史 -->
        <div class="history-section">
            <div class="history-header">
                <h2>📜 密钥更换历史</h2>
                <button class="btn-update" onclick="loadHistory()">
                    🔄 刷新
                </button>
            </div>
            <div id="historyContent">
                <div class="empty-state">
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api/admin/keys';

        // 页面加载时获取密钥状态
        window.onload = function() {
            loadKeyStatus();
            loadHistory();
        };

        // 加载密钥状态
        async function loadKeyStatus() {
            showLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/status`);
                const result = await response.json();

                if (result.success) {
                    updateStatusCards(result.data);
                } else {
                    showAlert('获取密钥状态失败: ' + result.error, true);
                }
            } catch (error) {
                console.error('加载失败:', error);
                showAlert('网络错误，请重试', true);
            } finally {
                showLoading(false);
            }
        }

        // 更新状态卡片
        function updateStatusCards(data) {
            // 电子卡密钥
            const electronicCard = data.electronic_card_key;
            document.getElementById('electronicCardLastChanged').textContent = electronicCard.last_changed;
            document.getElementById('electronicCardDays').textContent = electronicCard.days_since_change + ' 天';

            const electronicCardBadge = document.getElementById('electronicCardBadge');
            const electronicCardStatus = document.getElementById('electronicCardStatus');

            if (electronicCard.needs_rotation) {
                electronicCardBadge.textContent = '⚠️ 建议更换';
                electronicCardBadge.className = 'status-badge warning';
                electronicCardStatus.textContent = '已超过建议更换周期';
                electronicCardStatus.style.color = '#856404';
            } else {
                electronicCardBadge.textContent = '✓ 状态良好';
                electronicCardBadge.className = 'status-badge ok';
                const daysLeft = 30 - electronicCard.days_since_change;
                electronicCardStatus.textContent = `还有 ${daysLeft} 天需要更换`;
                electronicCardStatus.style.color = '#155724';
            }

            // 微信密码
            const wechat = data.wechat_passwords;
            document.getElementById('teacherPassword').textContent = wechat.teacher_password;
            document.getElementById('parentPassword').textContent = wechat.parent_password;
            document.getElementById('wechatLastUpdated').textContent = wechat.last_changed;
        }

        // 更换密钥
        async function rotateKey(keyType) {
            const keyName = '电子校友卡HMAC密钥';

            if (!confirm(`确定要更换${keyName}吗？\n\n⚠️ 更换后需要重启Flask服务才能生效！\n\n更换密钥后，旧的校友卡将无法验证，请确保所有用户已重新生成。`)) {
                return;
            }

            const adminPassword = prompt('请输入管理员密码确认：');
            if (!adminPassword) {
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/rotate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        key_type: keyType,
                        admin_password: adminPassword
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert(`✅ ${keyName}更换成功！\n\n密钥预览: ${result.data.new_key_preview}\n更换时间: ${result.data.changed_at}\n\n⚠️ 请重启Flask服务使新密钥生效！`);
                    loadKeyStatus();
                    loadHistory();
                } else {
                    showAlert('❌ 更换失败: ' + result.error, true);
                }
            } catch (error) {
                console.error('更换失败:', error);
                showAlert('❌ 网络错误，请检查服务器连接', true);
            } finally {
                showLoading(false);
            }
        }

        // 更新微信密码
        async function updateWechatPasswords() {
            const teacherPassword = document.getElementById('teacherPasswordInput').value.trim();
            const parentPassword = document.getElementById('parentPasswordInput').value.trim();

            if (!teacherPassword && !parentPassword) {
                showAlert('请至少输入一个密码', true);
                return;
            }

            if ((teacherPassword && teacherPassword.length < 2) || (teacherPassword && teacherPassword.length > 4)) {
                showAlert('教师密码必须是2-4位', true);
                return;
            }

            if ((parentPassword && parentPassword.length < 2) || (parentPassword && parentPassword.length > 4)) {
                showAlert('家长密码必须是2-4位', true);
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/wechat/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        teacher_password: teacherPassword,
                        parent_password: parentPassword
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('微信登录密码更新成功！');
                    document.getElementById('teacherPasswordInput').value = '';
                    document.getElementById('parentPasswordInput').value = '';
                    loadKeyStatus();
                } else {
                    showAlert('更新失败: ' + result.error, true);
                }
            } catch (error) {
                console.error('更新失败:', error);
                showAlert('网络错误，请重试', true);
            } finally {
                showLoading(false);
            }
        }

        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE_URL}/history?limit=20`);
                const result = await response.json();

                if (result.success) {
                    renderHistory(result.data.history);
                } else {
                    document.getElementById('historyContent').innerHTML =
                        '<div class="empty-state"><p>加载失败</p></div>';
                }
            } catch (error) {
                console.error('加载历史失败:', error);
                document.getElementById('historyContent').innerHTML =
                    '<div class="empty-state"><p>加载失败</p></div>';
            }
        }

        // 渲染历史记录
        function renderHistory(history) {
            if (!history || history.length === 0) {
                document.getElementById('historyContent').innerHTML =
                    '<div class="empty-state"><p>暂无历史记录</p></div>';
                return;
            }

            const tableHTML = `
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>密钥类型</th>
                            <th>旧密钥预览</th>
                            <th>新密钥预览</th>
                            <th>操作人</th>
                            <th>原因</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${history.map(record => `
                            <tr>
                                <td>${record.changed_at}</td>
                                <td>${record.key_type === 'electronic_card' ? '电子卡密钥' : 'JWT密钥'}</td>
                                <td>${record.old_key_preview}</td>
                                <td>${record.new_key_preview}</td>
                                <td>${record.changed_by}</td>
                                <td>${record.reason || '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('historyContent').innerHTML = tableHTML;
        }

        // 显示提示消息
        function showAlert(message, isError = false) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = 'alert alert-' + (isError ? 'error' : 'success') + ' show';

            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        // 显示加载状态
        function showLoading(show) {
            const loadingDiv = document.getElementById('loading');
            if (show) {
                loadingDiv.classList.add('show');
            } else {
                loadingDiv.classList.remove('show');
            }
        }
    </script>
</body>
</html>
