<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录调试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-info { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffe6e6; color: #cc0000; }
        .success { background: #e6ffe6; color: #006600; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 100px; }
        input, button { padding: 8px; }
        button { background: #007cba; color: white; border: none; cursor: pointer; margin: 5px; }
        button:hover { background: #005a87; }
    </style>
</head>
<body>
    <h1>登录功能调试</h1>

    <div class="form-group">
        <label>用户名:</label>
        <input type="text" id="username" value="admin">
    </div>

    <div class="form-group">
        <label>密码:</label>
        <input type="password" id="password" value="admin123">
    </div>

    <button onclick="testLogin()">测试登录</button>
    <button onclick="clearStorage()">清除存储</button>
    <button onclick="checkStorage()">检查存储</button>

    <div id="debug-output"></div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5000/api';

        function addDebugOutput(message, type = 'info') {
            const output = document.getElementById('debug-output');
            const div = document.createElement('div');
            div.className = `debug-info ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            output.appendChild(div);
            console.log(message);
        }

        function checkStorage() {
            const token = localStorage.getItem('admin_token');
            const user = localStorage.getItem('admin_user');

            addDebugOutput(`=== 存储状态检查 ===`, 'info');
            addDebugOutput(`Token存在: ${!!token}`, token ? 'success' : 'error');
            addDebugOutput(`User存在: ${!!user}`, user ? 'success' : 'error');

            if (token) {
                addDebugOutput(`Token内容: ${token.substring(0, 50)}...`, 'info');
            }

            if (user) {
                addDebugOutput(`User内容: ${user}`, 'info');
            }
        }

        function clearStorage() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            addDebugOutput('已清除所有存储的认证信息', 'info');
            checkStorage();
        }

        async function testLogin() {
            addDebugOutput('=== 开始登录测试 ===', 'info');

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            addDebugOutput(`尝试登录用户: ${username}`, 'info');

            try {
                addDebugOutput('发送登录请求...', 'info');

                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                addDebugOutput(`响应状态码: ${response.status}`, response.ok ? 'success' : 'error');

                const responseText = await response.text();
                addDebugOutput(`响应原文: ${responseText}`, 'info');

                try {
                    const data = JSON.parse(responseText);
                    addDebugOutput(`解析后的数据: ${JSON.stringify(data)}`, 'info');

                    if (response.ok && data.access_token) {
                        // 保存token
                        localStorage.setItem('admin_token', data.access_token);
                        localStorage.setItem('admin_user', JSON.stringify(data.user));

                        addDebugOutput('✅ 登录成功！Token已保存', 'success');
                        addDebugOutput(`Token: ${data.access_token.substring(0, 50)}...`, 'success');

                        // 验证token
                        await verifyToken(data.access_token);
                    } else {
                        addDebugOutput('❌ 登录失败', 'error');
                        addDebugOutput(`错误信息: ${data.message || '未知错误'}`, 'error');
                    }
                } catch (parseError) {
                    addDebugOutput(`JSON解析失败: ${parseError.message}`, 'error');
                }

            } catch (error) {
                addDebugOutput(`请求失败: ${error.message}`, 'error');
                addDebugOutput(`网络错误或服务器不可达`, 'error');
            }
        }

        async function verifyToken(token) {
            addDebugOutput('=== 验证Token ===', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/verify`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                addDebugOutput(`Token验证状态码: ${response.status}`, response.ok ? 'success' : 'error');

                if (response.ok) {
                    const data = await response.json();
                    addDebugOutput(`Token验证成功: ${JSON.stringify(data)}`, 'success');
                } else {
                    const errorText = await response.text();
                    addDebugOutput(`Token验证失败: ${errorText}`, 'error');
                }
            } catch (error) {
                addDebugOutput(`Token验证请求失败: ${error.message}`, 'error');
            }
        }

        // 页面加载时检查存储状态
        window.onload = function() {
            checkStorage();
        };
    </script>
</body>
</html>
