<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户创建功能测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; background: #007cba; color: white; border: none; cursor: pointer; margin: 5px; border-radius: 3px; }
        button:hover { background: #005a87; }
        .log { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>用户创建功能测试</h1>

    <div class="info">
        <h3>说明：</h3>
        <p>此测试将验证用户创建功能是否已经修复，不再出现401错误和跳转到登录页面的问题。</p>
    </div>

    <div>
        <button onclick="testUserCreation()">测试用户创建</button>
        <button onclick="clearLog()">清除日志</button>
    </div>

    <div id="test-results"></div>
    <div id="log-container">
        <h4>测试日志：</h4>
        <div id="log" class="log"></div>
    </div>

    <script>
        const ADMIN_CONFIG = {
            API_BASE_URL: 'http://127.0.0.1:5000/api'
        };

        function log(message, type = 'info') {
            const logContainer = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}\n`;
            logContainer.textContent += logEntry;
            logContainer.scrollTop = logContainer.scrollHeight;
            console.log(message);
        }

        function showResult(message, type = 'info') {
            const resultsContainer = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${type}`;
            resultDiv.textContent = message;
            resultsContainer.appendChild(resultDiv);
        }

        function clearLog() {
            document.getElementById('log').textContent = '';
            document.getElementById('test-results').innerHTML = '';
        }

        async function testUserCreation() {
            clearLog();
            log('=== 开始用户创建测试 ===');
            showResult('正在测试用户创建功能...', 'info');

            try {
                // 1. 检查认证状态
                log('步骤1: 检查认证状态');
                const token = localStorage.getItem('admin_token');

                if (!token) {
                    log('Token不存在，需要先登录');
                    showResult('需要先登录管理员账号', 'error');
                    // 尝试使用默认账号登录
                    await autoLogin();
                    return;
                }

                log(`Token存在: ${token.substring(0, 50)}...`);
                showResult('认证状态检查通过', 'success');

                // 2. 生成测试用户数据
                log('步骤2: 生成测试用户数据');
                const testUser = {
                    username: 'testuser_' + Date.now(),
                    password: 'test123456',
                    real_name: '测试用户',
                    email: `test${Date.now()}@example.com`,
                    phone: '13800138000',
                    user_type: 'teacher'
                };
                log(`测试用户数据: ${JSON.stringify(testUser, null, 2)}`);

                // 3. 发送创建请求
                log('步骤3: 发送用户创建请求');
                const requestData = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(testUser)
                };

                log(`请求URL: ${ADMIN_CONFIG.API_BASE_URL}/admin/users`);
                log(`请求配置: ${JSON.stringify(requestData, null, 2)}`);

                log(`准备发送请求到: ${ADMIN_CONFIG.API_BASE_URL + '/admin/users'}`);

                let response;
                try {
                    response = await fetch(ADMIN_CONFIG.API_BASE_URL + '/admin/users', requestData);
                    log(`✅ fetch请求成功执行`);
                } catch (fetchError) {
                    log(`❌ fetch请求失败: ${fetchError.message}`);
                    log(`错误类型: ${fetchError.constructor.name}`);
                    log(`错误详情: ${JSON.stringify(fetchError, null, 2)}`);

                    // 检查常见的网络错误
                    if (fetchError.message === 'Failed to fetch') {
                        log('可能的原因:');
                        log('1. 服务器未运行或端口错误');
                        log('2. CORS限制');
                        log('3. 网络连接问题');
                        log('4. 防火墙阻止');

                        // 尝试简单的连接测试
                        log('尝试简单的连接测试...');
                        try {
                            const testResponse = await fetch(ADMIN_CONFIG.API_BASE_URL + '/');
                            log(`✅ 基础连接测试成功: ${testResponse.status}`);
                        } catch (testError) {
                            log(`❌ 基础连接测试失败: ${testError.message}`);
                        }
                    }
                    throw fetchError;
                }

                log(`响应状态: ${response.status}`);
                log(`响应状态文本: ${response.statusText}`);
                log(`响应头: ${JSON.stringify(Object.fromEntries(response.headers.entries()), null, 2)}`);

                if (!response.ok) {
                    const errorText = await response.text();
                    log(`响应错误内容: ${errorText}`);
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const responseText = await response.text();
                log(`响应原始内容: ${responseText}`);

                let data;
                try {
                    data = JSON.parse(responseText);
                    log(`解析后的响应数据: ${JSON.stringify(data, null, 2)}`);
                } catch (parseError) {
                    log(`JSON解析失败: ${parseError.message}`);
                    throw new Error('响应数据解析失败');
                }

                // 4. 验证响应
                log('步骤4: 验证响应结果');
                if (data.message && data.user) {
                    log('✅ 用户创建成功！');
                    showResult(`用户创建成功！用户名: ${data.user.username}, ID: ${data.user.id}`, 'success');
                    log(`创建的用户信息: ${JSON.stringify(data.user, null, 2)}`);
                } else {
                    log('❌ 响应格式不符合预期');
                    showResult('响应格式不符合预期', 'error');
                }

            } catch (error) {
                log(`❌ 测试失败: ${error.message}`);
                log(`错误堆栈: ${error.stack}`);
                showResult(`测试失败: ${error.message}`, 'error');
            }

            log('=== 用户创建测试完成 ===');
        }

        async function autoLogin() {
            log('尝试自动登录...');
            try {
                const loginData = {
                    username: 'admin',
                    password: 'admin123'
                };

                const response = await fetch(ADMIN_CONFIG.API_BASE_URL + '/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });

                if (!response.ok) {
                    throw new Error(`登录失败: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();

                if (data.access_token) {
                    localStorage.setItem('admin_token', data.access_token);
                    log('✅ 自动登录成功！');
                    showResult('自动登录成功，可以重试用户创建测试', 'success');

                    // 登录成功后自动重新测试
                    setTimeout(() => {
                        testUserCreation();
                    }, 1000);
                } else {
                    throw new Error('登录响应中没有token');
                }
            } catch (error) {
                log(`❌ 自动登录失败: ${error.message}`);
                showResult(`自动登录失败: ${error.message}`, 'error');
            }
        }

        // 页面加载时检查初始状态
        window.onload = function() {
            log('=== 页面加载完成 ===');
            const token = localStorage.getItem('admin_token');
            log(`初始Token状态: ${token ? '存在' : '不存在'}`);

            if (token) {
                log(`Token内容: ${token.substring(0, 50)}...`);
            }
        };
    </script>
</body>
</html>
