<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生请假申请</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .apply-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 14px;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .form-group textarea {
            height: 100px;
            padding: 10px 15px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .radio-group {
            display: flex;
            gap: 15px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .radio-item input[type="radio"] {
            width: auto;
            height: auto;
        }

        .submit-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-card {
            display: none;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card.success {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: white;
        }

        .result-card.error {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: white;
        }

        .result-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .code-display {
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 15px 0;
        }

        .code-display .code {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 5px;
            font-family: 'Courier New', monospace;
        }

        .info-list {
            margin-top: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .info-label {
            font-weight: bold;
        }

        .back-btn {
            width: 100%;
            height: 45px;
            background: #f0f0f0;
            color: #666;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }

        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="apply-container">
        <div class="header">
            <h1>📝 学生请假申请</h1>
            <div class="subtitle">家长填写 → 班主任审批 → 生成请假码</div>
        </div>

        <div class="note">
            <strong>⚠️ 提示：</strong>提交申请后，请等待班主任审批。审批通过后将生成6位请假码，学生凭码出入校。
        </div>

        <form id="applyForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="studentName">学生姓名 *</label>
                    <input type="text" id="studentName" placeholder="请输入学生姓名" required>
                </div>
                <div class="form-group">
                    <label for="studentId">学生学号 *</label>
                    <input type="text" id="studentId" placeholder="请输入学号" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="parentName">家长姓名 *</label>
                    <input type="text" id="parentName" placeholder="请输入家长姓名" required>
                </div>
                <div class="form-group">
                    <label for="parentPhone">家长手机号 *</label>
                    <input type="tel" id="parentPhone" placeholder="请输入手机号" required>
                </div>
            </div>

            <div class="form-group">
                <label for="parentIdCard">家长身份证号（选填）</label>
                <input type="text" id="parentIdCard" placeholder="用于身份验证">
            </div>

            <div class="form-group">
                <label>请假类型 *</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="leaveTypeSick" name="leaveType" value="sick" checked>
                        <label for="leaveTypeSick">病假</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="leaveTypePersonal" name="leaveType" value="personal">
                        <label for="leaveTypePersonal">事假</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="leaveTypeOther" name="leaveType" value="other">
                        <label for="leaveTypeOther">其他</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="leaveReason">请假原因 *</label>
                <textarea id="leaveReason" placeholder="请详细说明请假原因" required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="returnDate">预计返校日期 *</label>
                    <input type="date" id="returnDate" required>
                </div>
                <div class="form-group">
                    <label for="returnTime">预计返校时间 *</label>
                    <input type="time" id="returnTime" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">提交申请</button>
        </form>

        <div class="result-card" id="resultCard">
            <div class="result-title" id="resultTitle"></div>
            <div id="resultContent"></div>
            <button class="back-btn" onclick="window.location.href='/'">返回主页</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api/student-leave';

        // 设置默认返校时间为明天早上8点
        document.addEventListener('DOMContentLoaded', function() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dateStr = tomorrow.toISOString().split('T')[0];
            document.getElementById('returnDate').value = dateStr;
            document.getElementById('returnTime').value = '08:00';
        });

        // 表单提交
        document.getElementById('applyForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            const formData = {
                student_name: document.getElementById('studentName').value.trim(),
                student_id: document.getElementById('studentId').value.trim(),
                parent_name: document.getElementById('parentName').value.trim(),
                parent_phone: document.getElementById('parentPhone').value.trim(),
                parent_id_card: document.getElementById('parentIdCard').value.trim() || null,
                leave_type: document.querySelector('input[name="leaveType"]:checked').value,
                leave_reason: document.getElementById('leaveReason').value.trim(),
                expected_return_date: document.getElementById('returnDate').value,
                expected_return_time: document.getElementById('returnTime').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/apply`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess(result.data);
                } else {
                    showError(result.error || '申请提交失败');
                }

            } catch (error) {
                console.error('申请失败:', error);
                showError('网络错误，请重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交申请';
            }
        });

        // 显示成功结果
        function showSuccess(data) {
            const resultCard = document.getElementById('resultCard');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');

            resultCard.className = 'result-card success';
            resultCard.style.display = 'block';
            resultTitle.textContent = '✅ 申请提交成功';

            let html = `
                <p style="text-align: center; margin-bottom: 15px;">${data.message}</p>
            `;

            if (data.status === 'approved') {
                // 如果是特批，直接显示码
                html += `
                    <div class="code-display">
                        <div style="font-size: 14px; margin-bottom: 10px;">请假码</div>
                        <div class="code">${data.leave_code}</div>
                    </div>
                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-label">有效期至：</span>
                            <span>${data.expires_at}</span>
                        </div>
                    </div>
                `;
            } else {
                // 等待审批
                html += `
                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-label">申请ID：</span>
                            <span>${data.application_id}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">状态：</span>
                            <span>等待班主任审批</span>
                        </div>
                    </div>
                    <p style="text-align: center; margin-top: 15px; font-size: 12px;">
                        请留意审批结果，审批后将生成6位请假码
                    </p>
                `;
            }

            resultContent.innerHTML = html;
            document.getElementById('applyForm').style.display = 'none';
        }

        // 显示错误
        function showError(message) {
            const resultCard = document.getElementById('resultCard');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');

            resultCard.className = 'result-card error';
            resultCard.style.display = 'block';
            resultTitle.textContent = '❌ 申请提交失败';
            resultContent.innerHTML = `<p style="text-align: center;">${message}</p>`;
        }
    </script>
</body>
</html>
