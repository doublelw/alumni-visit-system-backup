<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审批管理 - 电子校友卡</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #f0f0f0;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .quick-approve {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .quick-approve h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .form-group input {
            flex: 1;
            height: 45px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 0 15px;
            font-size: 15px;
        }

        .form-group button {
            height: 45px;
            padding: 0 30px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-group button:hover {
            background: #45a049;
        }

        .application-list {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .application-item {
            display: flex;
            padding: 20px;
            border-bottom: 1px solid #eee;
            align-items: center;
            gap: 20px;
        }

        .application-item:last-child {
            border-bottom: none;
        }

        .applicant-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #f0f0f0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .applicant-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .applicant-info {
            flex: 1;
        }

        .applicant-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .applicant-details {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .applicant-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-view {
            background: #2196F3;
            color: white;
        }

        .btn-view:hover {
            background: #1976D2;
        }

        .btn-approve {
            background: #4CAF50;
            color: white;
        }

        .btn-approve:hover {
            background: #45a049;
        }

        .btn-reject {
            background: #f44336;
            color: white;
        }

        .btn-reject:hover {
            background: #da190b;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            display: none;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4CAF50;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>审批管理</h1>
            <p style="color: #666; font-size: 14px;">管理访客入校申请</p>
        </div>

        <!-- 标签页 -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('pending')">待审批</div>
            <div class="tab" onclick="switchTab('approved')">已通过</div>
            <div class="tab" onclick="switchTab('rejected')">已拒绝</div>
        </div>

        <!-- 快速审批 -->
        <div id="quickApprove" class="quick-approve">
            <h2>快速审批（输入家长手机号）</h2>
            <div class="form-group">
                <input
                    type="tel"
                    id="quickPhone"
                    placeholder="请输入家长手机号"
                    maxlength="11"
                >
                <button onclick="quickApprove()">审批通过</button>
            </div>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">
                提示：家长把手机号告诉您后，您输入手机号即可快速审批通过
            </p>
        </div>

        <!-- 消息提示 -->
        <div id="message" class="message"></div>

        <!-- 加载状态 -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #999;">加载中...</p>
        </div>

        <!-- 申请列表 -->
        <div id="applicationList" class="application-list">
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <p>暂无待审批申请</p>
            </div>
        </div>

        <div class="back-link">
            <a href="/">&larr; 返回首页</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api/electronic-card';
        let currentTab = 'pending';

        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;

            // 更新标签样式
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');

            // 重新加载列表
            loadApplications();
        }

        // 加载申请列表
        async function loadApplications() {
            const loading = document.getElementById('loading');
            const applicationList = document.getElementById('applicationList');

            loading.classList.add('show');
            applicationList.style.display = 'none';

            try {
                // 根据当前标签页加载不同的数据
                let url = '';
                if (currentTab === 'pending') {
                    url = `${API_BASE_URL}/admin/visitor/pending`;
                } else if (currentTab === 'approved') {
                    // 这里需要添加API
                    url = `${API_BASE_URL}/admin/visitor/approved`;
                } else if (currentTab === 'rejected') {
                    url = `${API_BASE_URL}/admin/visitor/rejected`;
                }

                if (currentTab !== 'pending') {
                    // 暂时只实现待审批列表
                    applicationList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📝</div>
                            <p>功能开发中...</p>
                        </div>
                    `;
                    loading.classList.remove('show');
                    applicationList.style.display = 'block';
                    return;
                }

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('accessToken')}`
                    }
                });

                const result = await response.json();

                loading.classList.remove('show');
                applicationList.style.display = 'block';

                if (result.success && result.data.applications.length > 0) {
                    renderApplicationList(result.data.applications);
                } else {
                    applicationList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📋</div>
                            <p>暂无${currentTab === 'pending' ? '待审批' : ''}申请</p>
                        </div>
                    `;
                }

            } catch (error) {
                console.error('加载失败:', error);
                loading.classList.remove('show');
                applicationList.style.display = 'block';
                applicationList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <p>加载失败</p>
                    </div>
                `;
            }
        }

        // 渲染申请列表
        function renderApplicationList(applications) {
            const applicationList = document.getElementById('applicationList');

            let html = '';
            applications.forEach(app => {
                html += `
                    <div class="application-item">
                        <div class="applicant-photo">
                            ${app.photo_url
                                ? `<img src="${app.photo_url}" alt="${app.visitor_name}">`
                                : '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#f0f0f0;font-size:24px;">👤</div>'
                            }
                        </div>
                        <div class="applicant-info">
                            <div class="applicant-name">${app.visitor_name}</div>
                            <div class="applicant-details">
                                <div>访问事由：${app.visit_reason}</div>
                                <div>接待人：${app.host_name}</div>
                                <div>申请时间：${app.created_at}</div>
                            </div>
                        </div>
                        <div class="applicant-actions">
                            <button class="btn btn-view" onclick="viewApplication(${app.id})">详情</button>
                            <button class="btn btn-approve" onclick="approveApplication(${app.id})">通过</button>
                            <button class="btn btn-reject" onclick="rejectApplication(${app.id})">拒绝</button>
                        </div>
                    </div>
                `;
            });

            applicationList.innerHTML = html;
        }

        // 查看详情
        function viewApplication(applicationId) {
            // 这里可以打开模态框显示详情
            showMessage('info', '功能开发中...');
        }

        // 审批通过
        async function approveApplication(applicationId) {
            if (!confirm('确认审批通过此申请？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/admin/visitor/approve/${applicationId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('accessToken')}`
                    },
                    body: JSON.stringify({
                        action: 'approve'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('success', '审批通过！');
                    loadApplications();
                } else {
                    showMessage('error', result.error || '审批失败');
                }

            } catch (error) {
                console.error('审批失败:', error);
                showMessage('error', '审批失败，请重试');
            }
        }

        // 审批拒绝
        async function rejectApplication(applicationId) {
            const reason = prompt('请输入拒绝理由：');

            if (!reason) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/admin/visitor/approve/${applicationId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('accessToken')}`
                    },
                    body: JSON.stringify({
                        action: 'reject',
                        rejection_reason: reason
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('success', '已拒绝申请');
                    loadApplications();
                } else {
                    showMessage('error', result.error || '操作失败');
                }

            } catch (error) {
                console.error('操作失败:', error);
                showMessage('error', '操作失败，请重试');
            }
        }

        // 快速审批（输入手机号）
        async function quickApprove() {
            const phone = document.getElementById('quickPhone').value.trim();

            if (!phone) {
                showMessage('error', '请输入家长手机号');
                return;
            }

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showMessage('error', '请输入正确的手机号');
                return;
            }

            try {
                // 这里需要调用快速审批API
                // 暂时使用prompt方式
                const accessCode = prompt('请生成访客码（留空自动生成）：');

                if (accessCode === null) {
                    // 自动生成
                    accessCode = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
                }

                // 这里应该调用API
                showMessage('success', `审批通过！访客码：${accessCode}`);

                // 清空输入
                document.getElementById('quickPhone').value = '';

            } catch (error) {
                console.error('快速审批失败:', error);
                showMessage('error', '操作失败，请重试');
            }
        }

        // 显示消息
        function showMessage(type, text) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message show ${type}`;

            setTimeout(() => {
                message.classList.remove('show');
            }, 3000);
        }

        // 页面加载时加载待审批列表
        window.onload = function() {
            loadApplications();
        };

        // 输入限制
        document.getElementById('quickPhone').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
